name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Build MCP
        run: |
          cd mcp
          npm ci
          npm run build
      - name: Build CLI
        run: npm --workspace packages/cli run build
      - name: Run MCP unit tests
        run: cd mcp && npx vitest run tests/api-client.test.ts
      - name: Run root unit tests
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: bluekiwi:ci
