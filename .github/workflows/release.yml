name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: extract
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  build-cli-artifact:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build app bundle for CLI runtime
        run: npm run build
      - name: Build CLI package bundle
        run: npm --workspace packages/cli run build
      - uses: actions/upload-artifact@v4
        with:
          name: cli-dist-${{ needs.verify-version.outputs.version }}
          path: packages/cli/dist
          if-no-files-found: error

  docker-publish:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/dandacompany/bluekiwi
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  npm-publish:
    needs: [verify-version, build-cli-artifact]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v5
        with:
          name: cli-dist-${{ needs.verify-version.outputs.version }}
          path: packages/cli/dist
      - name: Sync CLI version
        env:
          RELEASE_VERSION: ${{ needs.verify-version.outputs.version }}
        run: |
          cd packages/cli
          npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version
      - name: Publish CLI
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_VERSION: ${{ needs.verify-version.outputs.version }}
        run: |
          cd packages/cli
          EXISTING=$(npm view "bluekiwi@${RELEASE_VERSION}" version 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "bluekiwi@${EXISTING} already published — skipping"
          else
            npm publish --access public
          fi

  sync-skillsmp:
    needs: verify-version
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Push skill files to bluekiwi-skills repo
        env:
          GH_TOKEN: ${{ secrets.SKILLSMP_PAT }}
          RELEASE_VERSION: ${{ needs.verify-version.outputs.version }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "SKILLSMP_PAT not set — skipping skill sync"
            exit 0
          fi
          git clone "https://x-access-token:${GH_TOKEN}@github.com/dandacompany/bluekiwi-skills.git" /tmp/mp || {
            echo "bluekiwi-skills repo not accessible — skipping skill sync"
            exit 0
          }
          rm -rf /tmp/mp/skills
          cp -R packages/cli/src/assets/skills /tmp/mp/skills
          cd /tmp/mp
          git config user.email "release@bluekiwi.dev"
          git config user.name "BlueKiwi Release Bot"
          git add .
          git commit -m "chore: sync bk-* skills for v${RELEASE_VERSION}" || exit 0
          git tag "v${RELEASE_VERSION}" || true
          git push origin main --tags

  github-release:
    needs: [docker-publish, npm-publish, sync-skillsmp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Docker: `ghcr.io/dandacompany/bluekiwi:${{ needs.verify-version.outputs.version }}`
            NPM: `npm install -g bluekiwi@${{ needs.verify-version.outputs.version }}`
