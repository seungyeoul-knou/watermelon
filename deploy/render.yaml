# deploy/render.yaml
services:
  - type: web
    name: watermelon
    runtime: docker
    dockerfilePath: ./docker/Dockerfile
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: watermelon-db
          property: connectionString
databases:
  - name: watermelon-db
    databaseName: watermelon
    user: watermelon
